<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Custos Chat</title>
<style>
  :root { color-scheme: dark; --bg: #14161a; --panel: #1c1f26; --border: #2b2f38; --text: #e4e6eb; --muted: #8b93a1; --accent: #5b9dd9; --danger: #d9705b; --ok: #5bd98f; --warn: #d9c15b; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; font-size: 14px; }
  header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; font-size: 13px; flex: none; }
  header .title { font-weight: 600; }
  .status { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.connected { background: var(--ok); }
  .dot.error { background: var(--danger); }
  #messages { flex: 1; overflow-y: auto; padding: 4px 0; display: flex; flex-direction: column; }
  .entry { padding: 10px 16px; display: flex; flex-direction: column; gap: 3px; }
  .entry-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
  .entry.user { background: rgba(91,157,217,0.06); }
  .entry.user .entry-label { color: var(--accent); }
  .entry-body { white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere; line-height: 1.5; }
  .entry.error .entry-label { color: var(--danger); }
  .entry.error .entry-body { color: var(--danger); font-size: 12.5px; }
  .entry.approval { margin: 6px 16px; padding: 10px 12px; background: rgba(217,193,91,0.08); border: 1px solid rgba(217,193,91,0.35); border-radius: 8px; gap: 6px; }
  .entry.approval .entry-label { color: var(--warn); }
  .entry.approval.deny { background: rgba(217,112,91,0.08); border-color: rgba(217,112,91,0.4); }
  .entry.approval.deny .entry-label { color: var(--danger); }
  .approval-head { display: flex; align-items: baseline; gap: 8px; font-family: ui-monospace, monospace; font-size: 12px; }
  .approval-reason { color: var(--muted); font-size: 12.5px; }
  .approval-actions { display: flex; gap: 8px; margin-top: 2px; }
  .approval-actions button { border-radius: 6px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); }
  .approval-actions .approve { background: var(--accent); color: #0d1117; border-color: var(--accent); }
  .approval-actions .deny { background: none; color: var(--danger); }
  .approval-verdict { font-size: 12px; font-weight: 600; }
  .approval-verdict.allow { color: var(--ok); }
  .approval-verdict.deny { color: var(--danger); }
  .entry.tool { padding: 4px 16px; }
  .tool-head { display: flex; align-items: baseline; gap: 8px; font-family: ui-monospace, monospace; font-size: 12px; }
  .tool-name { color: var(--accent); font-weight: 600; flex: none; }
  .entry.tool.error .tool-name { color: var(--danger); }
  .tool-arg { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tool-output { margin: 4px 0 0; padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere; font-family: ui-monospace, monospace; font-size: 11.5px; color: var(--muted); max-height: 260px; overflow-y: auto; }
  #composer { flex: none; display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--border); background: var(--panel); }
  #input { flex: 1; resize: none; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 9px 11px; font-family: inherit; font-size: 14px; max-height: 140px; }
  #composer button { background: var(--accent); border: none; color: #0d1117; font-weight: 600; border-radius: 8px; padding: 0 18px; cursor: pointer; }
  #composer button:disabled { opacity: 0.5; cursor: not-allowed; }
  .message { padding: 24px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<header>
  <span class="title">Custos Chat</span>
  <span class="status"><span class="dot" id="dot"></span><span id="status-text">Connecting…</span></span>
</header>
<div id="messages"></div>
<form id="composer">
  <textarea id="input" placeholder="Message Claude…" rows="1"></textarea>
  <button type="submit" id="send-btn">Send</button>
</form>

<script>
const token = new URLSearchParams(location.search).get("token");
const messagesEl = document.getElementById("messages");
const statusText = document.getElementById("status-text");
const dot = document.getElementById("dot");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send-btn");

function setStatus(text, cls) {
  statusText.textContent = text;
  dot.className = "dot" + (cls ? " " + cls : "");
}

function el(tag, attrs = {}, children = []) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "text") node.textContent = v;
    else if (k.startsWith("on") && typeof v === "function") node.addEventListener(k.slice(2), v);
    else node.setAttribute(k, v);
  }
  for (const c of [].concat(children)) if (c) node.appendChild(c);
  return node;
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

const ROLE_LABELS = { user: "You", assistant: "Claude", error: "Error" };

// Returns the entry element; its .entry-body holds the text so streaming
// deltas can keep appending to it.
function addEntry(role, text) {
  const entry = el("div", { class: `entry ${role}` });
  entry.appendChild(el("div", { class: "entry-label", text: ROLE_LABELS[role] || role }));
  const body = el("div", { class: "entry-body" });
  body.textContent = text;
  entry.appendChild(body);
  messagesEl.appendChild(entry);
  scrollToBottom();
  return entry;
}

function summarizeToolInput(input) {
  if (input && typeof input === "object") {
    const primary = input.command ?? input.file_path ?? input.path ?? input.pattern ?? input.url ?? input.prompt;
    if (typeof primary === "string") return primary;
  }
  const json = JSON.stringify(input);
  return json && json !== "{}" ? json : "";
}

function addToolBlock(name, inputObj) {
  const entry = el("div", { class: "entry tool" });
  const head = el("div", { class: "tool-head" });
  head.appendChild(el("span", { class: "tool-name", text: name }));
  head.appendChild(el("span", { class: "tool-arg", text: summarizeToolInput(inputObj) }));
  entry.appendChild(head);
  messagesEl.appendChild(entry);
  scrollToBottom();
  return entry;
}

const approvalEntriesById = {};

function addApprovalEntry(msg) {
  const isDeny = msg.severity === "deny";
  const entry = el("div", { class: `entry approval ${msg.severity || "ask"}` });
  entry.appendChild(el("div", { class: "entry-label", text: isDeny ? "Flagged unsafe — override?" : "Approval needed" }));
  const head = el("div", { class: "approval-head" });
  head.appendChild(el("span", { class: "tool-name", text: msg.toolName }));
  head.appendChild(el("span", { class: "tool-arg", text: summarizeToolInput(msg.toolInput) }));
  entry.appendChild(head);
  entry.appendChild(el("div", { class: "approval-reason", text: msg.reason }));

  const actions = el("div", { class: "approval-actions" });
  const answer = (decision) => {
    ws.send(JSON.stringify({ type: "approval_response", id: msg.id, decision }));
    resolveApprovalEntry(msg.id, decision);
  };
  actions.appendChild(el("button", { class: "approve", text: isDeny ? "Override & run" : "Approve", onclick: () => answer("allow") }));
  actions.appendChild(el("button", { class: "deny", text: "Deny", onclick: () => answer("deny") }));
  entry.appendChild(actions);

  messagesEl.appendChild(entry);
  approvalEntriesById[msg.id] = entry;
  scrollToBottom();
}

function resolveApprovalEntry(id, decision) {
  const entry = approvalEntriesById[id];
  if (!entry || entry.dataset.resolved) return;
  entry.dataset.resolved = "1";
  const actions = entry.querySelector(".approval-actions");
  if (actions) actions.remove();
  entry.appendChild(el("div", { class: `approval-verdict ${decision}`, text: decision === "allow" ? "Approved" : "Denied" }));
}

if (!token) {
  messagesEl.innerHTML = '<p class="message">No chat token in the URL. Start or open a chat from the Custos admin panel.</p>';
} else {
  let pendingEntry = null; // in-progress assistant entry, built up via text_delta
  let pendingBody = null; // its .entry-body node (where deltas append)
  const toolBlocksById = {}; // tool_use id -> the <details> element, so tool_result can attach to it

  const initialMessage = new URLSearchParams(location.search).get("initialMessage");

  const wsProtocol = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(`${wsProtocol}//${location.host}/remote/ws?token=${encodeURIComponent(token)}`);

  ws.addEventListener("open", () => {
    setStatus("Connected", "connected");
    if (initialMessage) {
      addEntry("user", initialMessage);
      ws.send(JSON.stringify({ type: "user_message", text: initialMessage }));
      sendBtn.disabled = true;
      setStatus("Thinking…", "connected");
      // Strip it from the URL so an accidental refresh doesn't resend it.
      const url = new URL(location.href);
      url.searchParams.delete("initialMessage");
      history.replaceState(null, "", url);
    }
  });
  ws.addEventListener("close", (ev) => {
    setStatus(ev.reason ? `Disconnected: ${ev.reason}` : "Disconnected", "error");
    sendBtn.disabled = true;
  });
  ws.addEventListener("error", () => setStatus("Connection error", "error"));

  ws.addEventListener("message", (ev) => {
    const msg = JSON.parse(ev.data);

    if (msg.type === "connected") {
      sendBtn.disabled = !!msg.running;
      if (msg.running) setStatus("Turn in progress…", "connected");
      return;
    }

    if (msg.type === "text_delta") {
      if (!pendingBody) {
        pendingEntry = addEntry("assistant", "");
        pendingBody = pendingEntry.querySelector(".entry-body");
      }
      pendingBody.textContent += msg.text;
      scrollToBottom();
      return;
    }

    if (msg.type === "message_final") {
      // Replaces whatever was streamed for this message -- authoritative
      // final content, including tool_use blocks (with fully-parsed input).
      if (pendingEntry) {
        pendingEntry.remove();
        pendingEntry = null;
        pendingBody = null;
      }
      for (const block of msg.content) {
        if (block.type === "text" && block.text) {
          addEntry("assistant", block.text);
        } else if (block.type === "tool_use") {
          toolBlocksById[block.id] = addToolBlock(block.name, block.input);
        }
      }
      return;
    }

    if (msg.type === "tool_result") {
      const entry = toolBlocksById[msg.toolUseId];
      if (entry) {
        if (msg.isError) entry.classList.add("error");
        const pre = el("pre", { class: "tool-output" });
        pre.textContent = msg.content;
        entry.appendChild(pre);
        scrollToBottom();
      }
      return;
    }

    if (msg.type === "approval_request") {
      addApprovalEntry(msg);
      return;
    }

    if (msg.type === "approval_resolved") {
      resolveApprovalEntry(msg.id, msg.decision);
      return;
    }

    if (msg.type === "turn_complete") {
      sendBtn.disabled = false;
      setStatus("Connected", "connected");
      if (msg.isError && msg.resultText) addEntry("error", msg.resultText);
      return;
    }

    if (msg.type === "error") {
      addEntry("error", msg.message);
      sendBtn.disabled = false;
      return;
    }
  });

  document.getElementById("composer").addEventListener("submit", (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text || ws.readyState !== WebSocket.OPEN) return;
    addEntry("user", text);
    ws.send(JSON.stringify({ type: "user_message", text }));
    input.value = "";
    input.style.height = "auto";
    sendBtn.disabled = true;
    setStatus("Thinking…", "connected");
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      document.getElementById("composer").requestSubmit();
    }
  });

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 140) + "px";
  });
}
</script>
</body>
</html>
