<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Custos Admin</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #14161a;
    --panel: #1c1f26;
    --border: #2b2f38;
    --text: #e4e6eb;
    --muted: #8b93a1;
    --accent: #5b9dd9;
    --danger: #d9705b;
    --ok: #5bd98f;
    --warn: #d9c15b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }
  header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  header button { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 6px 12px; font-size: 12.5px; cursor: pointer; }
  header button:hover { color: var(--text); border-color: var(--muted); }
  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 24px 28px 80px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  section.panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px;
  }
  section.panel h2 { margin: 0 0 4px; font-size: 15px; }
  section.panel .desc { color: var(--muted); font-size: 12.5px; margin: 0 0 16px; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  label { color: var(--muted); font-size: 12.5px; min-width: 70px; }
  input[type=text], input[type=password], select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 9px;
    font-size: 13px;
    font-family: inherit;
  }
  input[type=text], input[type=password] { flex: 1; min-width: 160px; }
  button {
    background: #262a33;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 13px;
    font-size: 13px;
    cursor: pointer;
  }
  button:hover { background: #2f3440; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 600; }
  button.primary:hover { filter: brightness(1.08); }
  button.danger { color: var(--danger); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge.ok { background: rgba(91,217,143,0.15); color: var(--ok); }
  .badge.warn { background: rgba(217,193,91,0.15); color: var(--warn); }
  .badge.off { background: rgba(139,147,161,0.15); color: var(--muted); }
  table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 13px; }
  th { color: var(--muted); font-weight: 500; font-size: 12px; }
  .priority-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .priority-item { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; }
  .priority-item .num { color: var(--muted); font-variant-numeric: tabular-nums; width: 18px; }
  .priority-item select { flex: 1; }
  .task-block { margin-bottom: 18px; }
  .task-block h3 { font-size: 13px; margin: 0 0 8px; color: var(--text); }
  pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    overflow-x: auto;
    font-size: 12.5px;
    margin: 0 0 8px;
  }
  .copy-row { display: flex; justify-content: flex-end; margin-top: -4px; margin-bottom: 12px; }
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.15s, transform 0.15s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  hr.sep { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .small { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <div>
    <h1>Custos</h1>
    <p>Providers, model routing, and Claude Code setup</p>
  </div>
  <button onclick="fetch('/logout', {method: 'POST'}).then(() => location.href = '/login')">Log out</button>
</header>
<main id="app">
  <section class="panel"><p class="small">Loading…</p></section>
</main>
<div class="toast" id="toast"></div>

<script>
const $ = (sel, el = document) => el.querySelector(sel);
const el = (tag, attrs = {}, children = []) => {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "text") node.textContent = v;
    else if (k.startsWith("on")) node.addEventListener(k.slice(2), v);
    else node.setAttribute(k, v);
  }
  for (const c of [].concat(children)) if (c) node.appendChild(c);
  return node;
};

let state = null;

function showToast(message, isError = false) {
  const t = $("#toast");
  t.textContent = message;
  t.className = "toast show" + (isError ? " error" : "");
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => { t.className = "toast"; }, 3000);
}

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { "content-type": "application/json", ...(opts.headers || {}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (res.status === 401) {
    location.href = "/login?next=" + encodeURIComponent(location.pathname);
    return new Promise(() => {}); // never resolves -- we're navigating away
  }
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
  return json;
}

async function loadState() {
  state = await api("/admin/api/state");
  state.projects = (await api("/admin/api/projects")).projects;
  for (const project of state.projects) {
    project.chats = (await api(`/admin/api/projects/${project.id}/chats`)).chats;
  }
  state.recentConversations = (await api("/admin/api/remote/conversations")).conversations;
  render();
}

async function reloadAfter(promise, successMessage) {
  try {
    await promise;
    showToast(successMessage);
    await loadState();
  } catch (err) {
    showToast(err.message, true);
  }
}

function render() {
  const app = $("#app");
  app.innerHTML = "";
  app.appendChild(renderAnthropicPanel());
  app.appendChild(renderInstancesPanel());
  app.appendChild(renderTasksPanel());
  app.appendChild(renderComplexityPanel());
  app.appendChild(renderProjectsPanel());
  app.appendChild(renderSecurityPanel());
  app.appendChild(renderSetupPanel());
}

// -- Anthropic -----------------------------------------------------------

function renderAnthropicPanel() {
  const { anthropic } = state;
  const section = el("section", { class: "panel" });
  section.appendChild(el("h2", { text: "Anthropic" }));
  section.appendChild(el("p", { class: "desc", text: "OAuth (your Claude subscription) or an API key. OAuth is tried first if connected." }));

  const oauthRow = el("div", { class: "row" });
  const badge = anthropic.oauth.connected
    ? el("span", { class: "badge ok", text: `Connected via ${anthropic.oauth.source === "claude-code" ? "Claude Code's session" : "Custos login"}` })
    : el("span", { class: "badge off", text: "Not connected" });
  oauthRow.appendChild(el("label", { text: "OAuth" }));
  oauthRow.appendChild(badge);
  if (anthropic.oauth.connected) {
    oauthRow.appendChild(el("button", { class: "danger", text: "Disconnect", onclick: () => reloadAfter(api("/admin/api/oauth/disconnect", { method: "POST" }), "OAuth disconnected") }));
  } else {
    oauthRow.appendChild(el("button", { class: "primary", text: "Connect via OAuth", onclick: startOAuthFlow }));
  }
  section.appendChild(oauthRow);
  section.appendChild(el("div", { id: "oauth-flow-area" }));

  section.appendChild(el("hr", { class: "sep" }));

  const keyRow = el("div", { class: "row" });
  keyRow.appendChild(el("label", { text: "API key" }));
  const keyInput = el("input", { type: "password", placeholder: anthropic.apiKeyMasked || "sk-ant-..." });
  keyRow.appendChild(keyInput);
  keyRow.appendChild(el("button", { class: "primary", text: "Save", onclick: () => {
    if (!keyInput.value) return showToast("Enter a key first", true);
    reloadAfter(api("/admin/api/anthropic-key", { method: "PUT", body: { apiKey: keyInput.value } }), "API key saved");
  }}));
  if (anthropic.apiKeySource !== "none") {
    keyRow.appendChild(el("button", { text: "Clear", onclick: () => reloadAfter(api("/admin/api/anthropic-key", { method: "PUT", body: { apiKey: null } }), "API key cleared") }));
  }
  section.appendChild(keyRow);
  const sourceNote = anthropic.apiKeySource === "env" ? "using ANTHROPIC_API_KEY from the environment" :
    anthropic.apiKeySource === "file" ? `configured (${anthropic.apiKeyMasked})` : "not configured -- used only as a fallback if OAuth is unavailable";
  section.appendChild(el("p", { class: "small", text: sourceNote }));

  return section;
}

async function startOAuthFlow() {
  const mode = confirm("Use your Claude Pro/Max subscription? Cancel to create an API key instead (Console mode).") ? "max" : "console";
  try {
    const { flowId, authorizationUrl } = await api("/admin/api/oauth/start", { method: "POST", body: { mode } });
    window.open(authorizationUrl, "_blank");
    const area = $("#oauth-flow-area");
    area.innerHTML = "";
    const row = el("div", { class: "row" });
    row.appendChild(el("label", { text: "Code" }));
    const input = el("input", { type: "text", placeholder: "paste the code#state shown on the page you just opened" });
    row.appendChild(input);
    row.appendChild(el("button", { class: "primary", text: "Complete", onclick: () => reloadAfter(
      api("/admin/api/oauth/complete", { method: "POST", body: { flowId, code: input.value } }),
      "OAuth connected"
    )}));
    area.appendChild(row);
  } catch (err) {
    showToast(err.message, true);
  }
}

// -- Model provider instances ---------------------------------------------

function renderInstancesPanel() {
  const section = el("section", { class: "panel" });
  section.appendChild(el("h2", { text: "Model providers" }));
  section.appendChild(el("p", { class: "desc", text: "Any provider speaking the OpenAI chat-completions format: Ollama, OpenAI, DeepSeek, Gemini, Groq, Mistral, xAI, OpenRouter, or a custom endpoint. Give a task a fast cheap model or a bigger capable one." }));

  const table = el("table");
  table.appendChild(el("tr", {}, [
    el("th", { text: "Name" }), el("th", { text: "Base URL" }), el("th", { text: "Model" }), el("th", { text: "API key" }), el("th", { text: "Budget" }), el("th", { text: "" }),
  ]));
  for (const [name, instance] of Object.entries(state.instances)) {
    const budgetText = instance.budget
      ? `$${instance.spentUsd.toFixed(2)} / $${instance.budget.limitUsd} per ${instance.budget.periodDays}d`
      : instance.pricing ? "tracked, no cap" : "—";
    table.appendChild(el("tr", {}, [
      el("td", { text: name }),
      el("td", { text: instance.baseUrl }),
      el("td", { text: instance.model }),
      el("td", { text: instance.apiKeyConfigured ? instance.apiKeyMasked : "—" }),
      el("td", { text: budgetText }),
      el("td", {}, [
        el("button", { text: "Delete", class: "danger", onclick: () => reloadAfter(
          api(`/admin/api/instances/${encodeURIComponent(name)}`, { method: "DELETE" }), `Removed "${name}"`
        )}),
      ]),
    ]));
  }
  section.appendChild(table);

  section.appendChild(el("hr", { class: "sep" }));
  section.appendChild(el("p", { class: "small", text: "Add or update an instance" }));

  const nameInput = el("input", { type: "text", placeholder: "name (e.g. ollama-fast)" });
  const urlInput = el("input", { type: "text", placeholder: "base URL" });
  const modelInput = el("input", { type: "text", placeholder: "model name" });
  const keyInput = el("input", { type: "password", placeholder: "API key (leave blank if none)" });
  const modelsHint = el("div", { class: "small" });

  const presetSelect = el("select", { onchange: (ev) => {
    const preset = state.providerPresets.find((p) => p.id === ev.target.value);
    if (preset && preset.id !== "custom") urlInput.value = preset.baseUrl;
    if (preset && !nameInput.value) nameInput.value = preset.id;
  }});
  for (const preset of state.providerPresets) {
    presetSelect.appendChild(el("option", { value: preset.id, text: preset.label }));
  }

  const row0 = el("div", { class: "row" }, [el("label", { text: "Preset" }), presetSelect]);
  const row1 = el("div", { class: "row" }, [nameInput, urlInput]);
  const row2 = el("div", { class: "row" }, [modelInput, keyInput]);
  const row3 = el("div", { class: "row" }, [
    el("button", { text: "List models", onclick: async () => {
      if (!urlInput.value) return showToast("Enter a base URL first", true);
      try {
        const { models } = await api("/admin/api/instances/probe-models", { method: "POST", body: { baseUrl: urlInput.value, apiKey: keyInput.value || undefined } });
        modelsHint.textContent = models.length ? `Available: ${models.join(", ")}` : "No models found";
      } catch (err) {
        modelsHint.textContent = err.message;
      }
    }}),
  ]);

  section.appendChild(el("p", { class: "small", text: "Optional: budget-based fallback. If set, this instance is skipped once its spend cap is hit for the current period, and the router falls through to the next entry in that task's priority list -- same mechanism as the rate-limit cooldown, triggered by cost instead." }));
  const inputPriceInput = el("input", { type: "text", placeholder: "$ per 1M input tokens" });
  const outputPriceInput = el("input", { type: "text", placeholder: "$ per 1M output tokens" });
  const budgetLimitInput = el("input", { type: "text", placeholder: "budget cap in $ (optional)" });
  const budgetPeriodInput = el("input", { type: "text", placeholder: "period in days (default 30)" });
  const row4 = el("div", { class: "row" }, [inputPriceInput, outputPriceInput, budgetLimitInput, budgetPeriodInput]);

  const row5 = el("div", { class: "row" }, [
    el("button", { class: "primary", text: "Save", onclick: () => {
      if (!nameInput.value || !urlInput.value || !modelInput.value) return showToast("Fill in name, base URL, and model", true);
      const hasPricing = inputPriceInput.value || outputPriceInput.value;
      if (budgetLimitInput.value && !hasPricing) return showToast("A budget needs pricing set too", true);
      const pricing = hasPricing ? { inputPerMillion: Number(inputPriceInput.value) || 0, outputPerMillion: Number(outputPriceInput.value) || 0 } : undefined;
      const budget = budgetLimitInput.value ? { limitUsd: Number(budgetLimitInput.value), periodDays: Number(budgetPeriodInput.value) || 30 } : undefined;
      reloadAfter(api(`/admin/api/instances/${encodeURIComponent(nameInput.value)}`, { method: "PUT", body: { baseUrl: urlInput.value, model: modelInput.value, apiKey: keyInput.value || undefined, pricing, budget } }), "Instance saved");
    }}),
  ]);
  section.appendChild(row0);
  section.appendChild(row1);
  section.appendChild(row2);
  section.appendChild(row3);
  section.appendChild(modelsHint);
  section.appendChild(row4);
  section.appendChild(row5);

  section.appendChild(el("hr", { class: "sep" }));
  section.appendChild(el("p", { class: "small", text: `Embeddings (used for memory search) come from Ollama's native API, currently ${state.embeddingProvider.baseUrl} / ${state.embeddingProvider.model}` }));
  const embUrl = el("input", { type: "text", placeholder: "http://host:11434 (no /v1)", value: state.embeddingProvider.baseUrl });
  const embModel = el("input", { type: "text", placeholder: "embedding model", value: state.embeddingProvider.model });
  section.appendChild(el("div", { class: "row" }, [
    embUrl, embModel,
    el("button", { class: "primary", text: "Save", onclick: () => reloadAfter(
      api("/admin/api/embedding-provider", { method: "PUT", body: { baseUrl: embUrl.value, model: embModel.value } }), "Embedding provider saved"
    )}),
  ]));

  return section;
}

// -- Task priorities ---------------------------------------------------

const TASK_LABELS = {
  general: "General (everyday Claude Code traffic)",
  permissionClassifier: "Permission classifier",
  memoryCurator: "Memory curator",
  complexityClassifier: "Complexity classifier",
};

function renderPriorityEditor(entries, providerNames, onSave) {
  const wrap = el("div");
  let current = entries.map((e) => ({ ...e }));

  function renumber() {
    current = current.map((e, i) => ({ ...e, priority: i + 1 }));
  }

  function redraw() {
    list.innerHTML = "";
    current.forEach((entry, i) => {
      const select = el("select", { onchange: (ev) => { current[i].provider = ev.target.value; } });
      for (const name of providerNames) {
        const opt = el("option", { value: name, text: name });
        if (name === entry.provider) opt.setAttribute("selected", "selected");
        select.appendChild(opt);
      }
      const item = el("div", { class: "priority-item" }, [
        el("span", { class: "num", text: String(i + 1) }),
        select,
        el("button", { text: "↑", onclick: () => { if (i > 0) { [current[i - 1], current[i]] = [current[i], current[i - 1]]; renumber(); redraw(); } } }),
        el("button", { text: "↓", onclick: () => { if (i < current.length - 1) { [current[i + 1], current[i]] = [current[i], current[i + 1]]; renumber(); redraw(); } } }),
        el("button", { class: "danger", text: "Remove", onclick: () => { current.splice(i, 1); renumber(); redraw(); } }),
      ]);
      list.appendChild(item);
    });
  }

  const list = el("div", { class: "priority-list" });
  const controls = el("div", { class: "row" }, [
    el("button", { text: "+ Add fallback", onclick: () => { current.push({ provider: providerNames[0], priority: current.length + 1 }); redraw(); } }),
    el("button", { class: "primary", text: "Save", onclick: () => onSave(current) }),
  ]);
  wrap.appendChild(list);
  wrap.appendChild(controls);
  redraw();
  return wrap;
}

function renderTasksPanel() {
  const section = el("section", { class: "panel" });
  section.appendChild(el("h2", { text: "Task routing" }));
  section.appendChild(el("p", { class: "desc", text: "Priority order per task -- the gateway tries each in order and falls over to the next on a rate limit or outage." }));

  for (const [taskKind, entries] of Object.entries(state.tasks)) {
    const block = el("div", { class: "task-block" });
    block.appendChild(el("h3", { text: TASK_LABELS[taskKind] || taskKind }));
    block.appendChild(renderPriorityEditor(entries, state.providerNames, (updated) =>
      reloadAfter(api(`/admin/api/tasks/${taskKind}`, { method: "PUT", body: { entries: updated } }), "Saved")
    ));
    section.appendChild(block);
  }

  return section;
}

// -- Complexity routing --------------------------------------------------

function renderComplexityPanel() {
  const { complexityRouting } = state;
  const section = el("section", { class: "panel" });
  section.appendChild(el("h2", { text: "Per-turn complexity routing" }));
  section.appendChild(el("p", { class: "desc", text: "Classifies each fresh human message (not tool-loop hops) as low/medium/high complexity and routes it to a different tier of models. Adds one extra classifier call before every human turn." }));

  const toggleRow = el("div", { class: "row" });
  const badge = complexityRouting.enabled ? el("span", { class: "badge ok", text: "Enabled" }) : el("span", { class: "badge off", text: "Disabled" });
  toggleRow.appendChild(badge);
  toggleRow.appendChild(el("button", { text: complexityRouting.enabled ? "Disable" : "Enable", onclick: () =>
    reloadAfter(api("/admin/api/complexity-routing", { method: "PUT", body: { enabled: !complexityRouting.enabled, tiers: complexityRouting.tiers } }), "Saved")
  }));
  section.appendChild(toggleRow);

  for (const [tier, entries] of Object.entries(complexityRouting.tiers)) {
    const block = el("div", { class: "task-block" });
    block.appendChild(el("h3", { text: tier.charAt(0).toUpperCase() + tier.slice(1) + " complexity" }));
    block.appendChild(renderPriorityEditor(entries, state.providerNames, (updated) => {
      const nextTiers = { ...complexityRouting.tiers, [tier]: updated };
      reloadAfter(api("/admin/api/complexity-routing", { method: "PUT", body: { enabled: complexityRouting.enabled, tiers: nextTiers } }), "Saved");
    }));
    section.appendChild(block);
  }

  return section;
}

// -- Projects / remote control ----------------------------------------

function renderProjectsPanel() {
  const section = el("section", { class: "panel" });
  section.appendChild(el("h2", { text: "Projects" }));
  section.appendChild(el("p", { class: "desc", text: "Each project is a workspace folder. Chats run \"claude\" in a real terminal inside this container, scoped to that folder, and stream over WebSocket -- steer them from your phone, another computer, or the Custos desktop app. A chat's connect link is a bearer credential: anyone with it can type into that session. Don't share it, and don't expose this port past a network you trust." }));

  section.appendChild(el("div", { class: "row" }, [
    el("button", { class: "primary", text: "New project", onclick: async () => {
      const name = prompt("Project name:");
      if (!name || !name.trim()) return;
      reloadAfter(api("/admin/api/projects", { method: "POST", body: { name: name.trim() } }), "Project created");
    }}),
  ]));

  const projects = state.projects || [];
  if (projects.length === 0) {
    section.appendChild(el("p", { class: "small", text: "No projects yet." }));
  }

  for (const project of projects) {
    section.appendChild(el("hr", { class: "sep" }));
    section.appendChild(renderProject(project));
  }

  const conversations = state.recentConversations || [];
  if (conversations.length > 0 && projects.length > 0) {
    section.appendChild(el("hr", { class: "sep" }));
    section.appendChild(el("p", { class: "small", text: "Resume a recent conversation into a project -- Claude opens with a summary of where it left off (not a literal replay; see README)." }));
    const list = el("div", { class: "priority-list" });
    for (const conv of conversations) {
      const when = new Date(conv.lastActiveAt).toLocaleString();
      const select = el("select", {}, projects.map((p) => el("option", { value: p.id, text: p.name })));
      list.appendChild(el("div", { class: "priority-item" }, [
        el("span", { class: "small", text: `${conv.preview || "(no preview)"} -- ${when} (${conv.exchangeCount} exchanges)` }),
        select,
        el("button", { class: "primary", text: "Resume into project", onclick: () => reloadAfter(
          api(`/admin/api/projects/${select.value}/chats`, { method: "POST", body: { resumeConversationId: conv.id } }), "Chat started"
        )}),
      ]));
    }
    section.appendChild(list);
  }

  return section;
}

function renderProject(project) {
  const wrap = el("div", {});
  wrap.appendChild(el("div", { class: "row" }, [
    el("strong", { text: project.name }),
    el("span", { class: "small", text: project.workspaceDir }),
  ]));
  wrap.appendChild(el("div", { class: "row" }, [
    el("button", { text: "New chat", onclick: () => reloadAfter(
      api(`/admin/api/projects/${project.id}/chats`, { method: "POST", body: {} }), "Chat started"
    )}),
    el("button", { text: "Rename", onclick: () => {
      const name = prompt("Project name:", project.name);
      if (!name || !name.trim() || name.trim() === project.name) return;
      reloadAfter(api(`/admin/api/projects/${project.id}`, { method: "PATCH", body: { name: name.trim() } }), "Renamed");
    }}),
    el("button", { class: "danger", text: "Delete project", onclick: () => {
      if (!confirm(`Delete "${project.name}"? This stops and removes all its chats -- the workspace folder and its files are left untouched.`)) return;
      reloadAfter(api(`/admin/api/projects/${project.id}`, { method: "DELETE" }), "Project deleted");
    }}),
  ]));

  const chats = project.chats || [];
  if (chats.length === 0) {
    wrap.appendChild(el("p", { class: "small", text: "No chats yet." }));
  } else {
    const list = el("div", { class: "priority-list" });
    for (const chat of chats) {
      list.appendChild(renderChat(chat));
    }
    wrap.appendChild(list);
  }
  return wrap;
}

function renderChat(chat) {
  const row = el("div", { class: "priority-item" });
  row.appendChild(el("span", { class: "small", text: chat.title }));
  row.appendChild(el("span", { class: `badge ${chat.active ? "ok" : "off"}`, text: chat.active ? `Active -- ${chat.connectedClients} connected` : "Stopped" }));

  if (chat.active) {
    const urlInput = el("input", { type: "text", value: chat.connectUrl });
    urlInput.readOnly = true;
    row.appendChild(urlInput);
    row.appendChild(el("button", { text: "Copy link", onclick: () => { navigator.clipboard.writeText(chat.connectUrl); showToast("Copied"); } }));
    row.appendChild(el("button", { text: "Open", onclick: () => window.open(chat.connectUrl, "_blank") }));
    row.appendChild(el("button", { class: "danger", text: "Stop", onclick: () => reloadAfter(
      api(`/admin/api/chats/${chat.id}/stop`, { method: "POST" }), "Chat stopped"
    )}));
  } else {
    row.appendChild(el("button", { class: "primary", text: "Reopen", onclick: () => reloadAfter(
      api(`/admin/api/chats/${chat.id}/reopen`, { method: "POST" }), "Chat reopened"
    )}));
    row.appendChild(el("button", { class: "danger", text: "Delete", onclick: () => {
      if (!confirm(`Delete chat "${chat.title}"?`)) return;
      reloadAfter(api(`/admin/api/chats/${chat.id}`, { method: "DELETE" }), "Chat deleted");
    }}));
  }
  return row;
}

// -- Security --------------------------------------------------

function renderSecurityPanel() {
  const section = el("section", { class: "panel" });
  section.appendChild(el("h2", { text: "Security" }));
  section.appendChild(el("p", { class: "desc", text: "Change the admin password used to sign in here and access remote control." }));

  const current = el("input", { type: "password", placeholder: "Current password" });
  const next = el("input", { type: "password", placeholder: "New password (min 8 chars)" });
  section.appendChild(el("div", { class: "row" }, [current, next, el("button", { class: "primary", text: "Change password", onclick: () => {
    if (!current.value || !next.value) return showToast("Fill in both fields", true);
    reloadAfter(api("/admin/api/change-password", { method: "POST", body: { currentPassword: current.value, newPassword: next.value } }), "Password changed");
  }})]));

  section.appendChild(el("hr", { class: "sep" }));
  section.appendChild(el("p", { class: "small", text: "Client API key -- required on every /v1/messages, /hooks/*, and /memory/search request, sent as the x-api-key header (the same header Claude Code already sends for real Anthropic API keys -- Custos checks this instead of forwarding it anywhere). Fails closed: until you generate one, those endpoints reject everything. Set the same value as ANTHROPIC_API_KEY on any Claude Code install pointed at this proxy." }));

  if (state.clientApiKey) {
    const keyRow = el("div", { class: "row" });
    const keyInput = el("input", { type: "text", value: state.clientApiKey });
    keyInput.readOnly = true;
    keyRow.appendChild(keyInput);
    keyRow.appendChild(el("button", { text: "Copy", onclick: () => { navigator.clipboard.writeText(state.clientApiKey); showToast("Copied"); } }));
    section.appendChild(keyRow);
    section.appendChild(el("div", { class: "row" }, [
      el("span", { class: "badge ok", text: "Enforced" }),
      el("button", { text: "Regenerate", onclick: () => {
        if (!confirm("This invalidates the current key immediately -- any Claude Code install still using the old one will start getting 401s until you update it. Continue?")) return;
        reloadAfter(api("/admin/api/client-key/generate", { method: "POST" }), "New key generated");
      }}),
      el("button", { class: "danger", text: "Clear key (blocks all proxy traffic)", onclick: () => {
        if (!confirm("This immediately blocks /v1/messages, /hooks/*, and /memory/search for everyone, including your own Claude Code installs, until you generate a new key. Continue?")) return;
        reloadAfter(api("/admin/api/client-key/clear", { method: "POST" }), "Key cleared -- proxy traffic now blocked");
      }}),
    ]));
  } else {
    section.appendChild(el("div", { class: "row" }, [
      el("span", { class: "badge off", text: "Not set -- all proxy traffic is blocked" }),
      el("button", { class: "primary", text: "Generate key", onclick: () => reloadAfter(api("/admin/api/client-key/generate", { method: "POST" }), "Key generated") }),
    ]));
  }

  return section;
}

// -- Setup instructions --------------------------------------------------

function copyButton(text) {
  return el("div", { class: "copy-row" }, [
    el("button", { text: "Copy", onclick: () => { navigator.clipboard.writeText(text); showToast("Copied"); } }),
  ]);
}

function renderSetupPanel() {
  const { setup } = state;
  const section = el("section", { class: "panel" });
  section.appendChild(el("h2", { text: "Claude Code setup" }));
  section.appendChild(el("p", { class: "desc", text: "Add both of these to point Claude Code at Custos." }));

  section.appendChild(el("p", { class: "small", text: "1. Environment variable" }));
  section.appendChild(el("pre", { text: setup.envExport }));
  section.appendChild(copyButton(setup.envExport));

  section.appendChild(el("p", { class: "small", text: "2. Add to ~/.claude/settings.json" }));
  section.appendChild(el("pre", { text: setup.hooksJson }));
  section.appendChild(copyButton(setup.hooksJson));
  section.appendChild(el("p", { class: "small", text: "If you already have PreToolUse hooks registered, merge the array entries rather than replacing the whole block." }));

  return section;
}

loadState().catch((err) => {
  $("#app").innerHTML = "";
  $("#app").appendChild(el("section", { class: "panel" }, [el("p", { text: "Failed to load: " + err.message })]));
});
</script>
</body>
</html>
