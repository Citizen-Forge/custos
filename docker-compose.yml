services:
  gateway:
    build: .
    ports:
      - "8787:8787"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./data:/app/data
      # The directory a remote-control session actually operates in --
      # point CUSTOS_WORKSPACE at whatever project(s) you want reachable
      # remotely. Defaults to an empty local ./workspace so this works
      # out of the box without editing anything.
      - ${CUSTOS_WORKSPACE:-./workspace}:/workspace
      # Optional: mount your own Claude Code login so a remote session
      # doesn't need its own /login. Uncomment and set the host path.
      # - ${HOME}/.claude:/root/.claude
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant-storage:
